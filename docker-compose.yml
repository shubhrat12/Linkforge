version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bitly_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: dbname
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bitly_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata: